services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    networks:
      - default
      - infra-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

networks:
  infra-net:
    external: true
    name: infra-net

volumes:
  caddy_data:
  caddy_config:
  redis_data:
